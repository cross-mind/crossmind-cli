# Lobsters top/hottest stories
url: "https://lobste.rs/hottest.json"
paginate:
  type: offset
  limit: "{{limit}}"
  pageSize: 25
responseRoot: ""
map:
  rank: _index
  title: title
  url: url
  score: score
  comments: comment_count
  author: submitter_user.username
  tags: tags
  created_at: created_at
template: "{rank}. score:{score} comments:{comments} {title} {url}"
sort: "score desc"
