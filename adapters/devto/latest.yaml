# DEV.to latest articles
url: "https://dev.to/api/articles?per_page={{limit}}"
paginate:
  type: offset
  limit: "{{limit}}"
  pageSize: 30
responseRoot: ""
map:
  rank: _index
  id: id
  title: title
  url: url
  score: positive_reactions_count
  comments: comments_count
  author: user.username
  tags: tag_list
  published_at: published_at
template: "{rank}. score:{score} comments:{comments} {title} {url}"
