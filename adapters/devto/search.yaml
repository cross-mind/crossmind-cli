# DEV.to search articles by keyword (full-text search endpoint)
# Note: /api/articles?tag= only accepts single-word tags and returns 404 for multi-word queries.
# Use the search endpoint for keyword queries instead.
url: "https://dev.to/api/articles/search?q={{query}}&per_page={{limit}}"
paginate:
  type: offset
  limit: "{{limit}}"
  pageSize: 30
responseRoot: ""
map:
  rank: _index
  id: id
  title: title
  url: url
  score: positive_reactions_count
  comments: comments_count
  author: user.username
  tags: tag_list
  published_at: published_at
template: "{rank}. score:{score} comments:{comments} {title} {url}"
sort: "score desc"
