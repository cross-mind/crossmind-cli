# Hacker News Ask HN posts
url: "https://hacker-news.firebaseio.com/v0/askstories.json"
paginate:
  type: ids
  limit: "{{limit}}"
  itemUrl: "https://hacker-news.firebaseio.com/v0/item/{{id}}.json"
map:
  rank: _index
  title: title
  score: score
  comments: descendants
  author: by
  created_at: time
  id: id
template: "{rank}. score:{score} comments:{comments} {title}"
sort: "score desc"
