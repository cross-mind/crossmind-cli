# Hacker News job postings
url: "https://hacker-news.firebaseio.com/v0/jobstories.json"
paginate:
  type: ids
  limit: "{{limit}}"
  itemUrl: "https://hacker-news.firebaseio.com/v0/item/{{id}}.json"
filter:
  type: job
map:
  rank: _index
  title: title
  url: url
  author: by
  created_at: time
  id: id
template: "{rank}. {title} {url}"
