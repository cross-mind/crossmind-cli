# Stack Overflow full-text search questions by keyword
# Uses q= (full-text) instead of intitle= so natural language queries return results.
url: "https://api.stackexchange.com/2.3/search/advanced?order=desc&sort=relevance&q={{query}}&site=stackoverflow&pagesize={{limit}}&filter=default"
paginate:
  type: offset
  limit: "{{limit}}"
  pageSize: 30
responseRoot: "items"
map:
  rank: _index
  title: title
  url: link
  score: score
  answers: answer_count
  views: view_count
  author: owner.display_name
  tags: tags
  is_answered: is_answered
  created_at: creation_date
template: "{rank}. score:{score} answers:{answers} views:{views} answered:{is_answered} {title} {url}"
sort: "score desc"
